document.querySelectorAll('.play-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.play-btn.playing').forEach(b => b.classList.remove('playing'));
        btn.classList.add('playing');

        const title = btn.dataset.title;
        modalTitle.textContent = title;
        modalAudio.querySelector('source').src = btn.dataset.audio;
        modalAudio.load();

        modalLyrics.innerHTML = '';
        if (lyricsData[title]) {
            modalLyrics.textContent = lyricsData[title];
            modalLyrics.style.whiteSpace = 'pre-line';
        } else {
            modalLyrics.innerHTML = '<p>Lyrics coming soon.</p>';
        }

        modal.classList.add('open');
    });
});

function closeModal(){
    modal.classList.remove('open');
    modalAudio.pause();
    document.querySelectorAll('.play-btn.playing').forEach(b => b.classList.remove('playing'));
}

document.getElementById('closeModal').addEventListener('click', closeModal);
modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
});
